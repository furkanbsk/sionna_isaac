project:
  name: isaacsim_sionna_localization
  seed: 456
  hash_algo: sha256
  solver_seed_strategy: frame_offset
  output_root: isaacsim_sionna/data/raw

runtime:
  isaac_fps: 60
  radio_update_hz: 20
  max_frames: 5400

isaac:
  headless: true
  render: false
  prim_paths:
    tx: /World/tx
    rx: /World/rx
    actors:
      - /World/humanoid_01

scenario:
  id: localization_multi_rx
  scene_usd: isaacsim_sionna/data/scenes_usd/localization_room.usd
  scene_sionna: isaacsim_sionna/data/scenes_sionna/localization_room.xml

storage:
  tensor_store:
    enabled: false
    format: hdf5
    path: csi_tensors.h5
    dtype: complex64
    compression: gzip
    chunk_frames: 64

labels:
  mode: localization
  target_actor: humanoid_01
  coordinate_frame: world
  activity_label: unknown
