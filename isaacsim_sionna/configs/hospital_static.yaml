project:
  name: isaacsim_sionna_hospital_static
  seed: 42
  hash_algo: sha256
  solver_seed_strategy: frame_offset
  output_root: isaacsim_sionna/data/raw

runtime:
  isaac_fps: 30
  radio_update_hz: 10
  max_frames: 60

env:
  conda_env_name: env_isaacsim

isaac:
  headless: true
  render: false
  geometry:
    mode: mesh
    mesh:
      format: ply
      output_dir: isaacsim_sionna/data/scenes_sionna/runtime_meshes
      max_meshes: 256
      include_regex: /Root/
      exclude_regex:
  prim_paths:
    tx: /World/tx
    rx: /World/rx
    actors: []
  anchors:
    auto_from_bbox: true
    height_m: 1.5
    tx_offset_norm: [0.2, 0.2]
    rx_offset_norm: [0.8, 0.8]
    max_meshes: 256

scenario:
  id: hospital_static
  scene_usd: isaacsim_sionna/data/scenes_usd/hospital.usd
  scene_sionna_cache: isaacsim_sionna/data/scenes_sionna/cache/hospital_runtime.xml

radio:
  carrier_hz: 3.5e9
  bandwidth_hz: 20e6
  num_subcarriers: 64
  max_depth: 5
  samples_per_src: 200000

storage:
  tensor_store:
    enabled: false
    format: hdf5
    path: csi_tensors.h5
    dtype: complex64
    compression: gzip
    chunk_frames: 64

labels:
  mode: none
  activity_label: unknown
