project:
  name: isaacsim_sionna_csi
  seed: 42
  hash_algo: sha256
  solver_seed_strategy: frame_offset
  output_root: isaacsim_sionna/data/raw

runtime:
  isaac_fps: 60
  radio_update_rate_hz: 10
  radio_update_hz: 10
  frame_skip_ratio:
  max_frames: 600

env:
  conda_env_name: env_isaacsim

isaac:
  headless: true
  render: false
  visualize_rays: false
  ray_viz:
    los_color_rgba: [1.0, 0.1, 0.1, 1.0]
    nlos_color_rgba: [0.2, 0.7, 1.0, 1.0]
    line_width: 2.0
    max_paths_to_draw: 128
    draw_only_when_rendering: true
  camera:
    enabled: false
    backend: replicator
    name: camera_main
    prim_path: /World/camera_main
    position_xyz: [0.0, -25.0, 18.0]
    target_xyz: [0.0, 0.0, 1.5]
    orientation_rpy_deg:
    orientation_quat_wxyz:
    resolution: [1280, 720]
    format: png
    output_subdir: renders
    warmup_steps: 1
  actor_motion:
    enabled: false
    update_every_tick: true
    proxy_half_extent_xyz: [0.25, 0.25, 0.9]
    actors: []
  geometry:
    mode: aabb
    mesh:
      format: ply
      output_dir: isaacsim_sionna/data/scenes_sionna/runtime_meshes
      max_meshes: 256
  prim_paths:
    tx: /World/tx
    rx: /World/rx
    actors:
      - /World/actor_0

scenario:
  id: base_static
  scene_usd: isaacsim_sionna/data/scenes_usd/example.usd
  scene_sionna: isaacsim_sionna/data/scenes_sionna/example_scene.xml

radio:
  carrier_hz: 3.5e9
  bandwidth_hz: 20e6
  num_subcarriers: 256
  csi_method: explicit_cir_to_ofdm
  max_depth: 5
  samples_per_src: 100000
  propagation:
    los: true
    specular_reflection: true
    diffuse_reflection: true
    refraction: true
    diffraction: true
    edge_diffraction: true
    diffraction_lit_region: true

storage:
  tensor_store:
    enabled: false
    format: hdf5
    path: csi_tensors.h5
    dtype: complex64
    compression: gzip
    chunk_frames: 64

qa:
  path_count:
    max_los_only_ratio: 0.8
  csi_variance:
    adaptive_scale: 1e-4
    abs_floor: 1e-8
  frequency_selectivity:
    metric: p90
    abs_floor: 1e-6
  bounds:
    mode: scene_bbox
    margin_m: 1.0
  strict: true

performance:
  profiling:
    enabled: true
    report_percentiles: [50, 95]

labels:
  mode: none
  activity_label: unknown
